<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>マイページ</title>
	<link rel="stylesheet" href="../static/css/style04-mypage.css" th:href="@{/css/style04-mypage.css}">

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

	<script th:src="@{/js/mypage.js}" defer></script>

	<script th:inline="javascript">
		window.selectedWeekday = /*[[${selectedWeekday}]]*/ 0;
		window.schedules = /*[[${schedules}]]*/[];
		window.weekNames = /*[[${weekNames}]]*/["月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日", "日曜日"];
	</script>
</head>

<body>

	<div id="tooltip"
		style="position: absolute; display: none; background: rgba(0,0,0,0.8); color: #fff; padding: 5px 10px; border-radius: 4px; pointer-events: none; z-index: 1000; font-size: 12px;">
	</div>

	<div class="top-info">
		<h2><span id="todayLabel" th:text="${weekNames[selectedWeekday]}">月曜日</span> です。</h2>
	</div>

	<div class="main-content">
		<h1>
			<span th:text="${session.user.name}">ユーザー</span> さんの
			<span th:text="${weekNames[selectedWeekday]}"></span>予定
		</h1>

		<div th:if="${#lists.isEmpty(schedules)}" style="color: #888; margin-bottom: 10px;">
			予定を登録してね！
		</div>

		<div class="graph-container">
			<canvas id="myChart"></canvas>
		</div>
	</div>

	<div class="action-bar">
		<div class="control-panel">
			<select id="weekSelect" onchange="changeDay()">
				<option th:each="name, stat : ${weekNames}" th:value="${stat.index}" th:text="${name}"
					th:selected="${stat.index == selectedWeekday}"></option>
			</select>
			<button onclick="goEdit()">選択した曜日を編集する</button>
			<a th:href="@{/logout}" class="logout-link">⚙ ログアウト</a>
		</div>
	</div>

</body>

</html>
